<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Labor Solutions AI Prompt Generator (SASMLCQ+C)</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #008FB3;
            --hover-color: #004050;
            --danger-color: #FA005F;
            --danger-hover: #cb004e;
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border-color: #cbd5e1;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            padding: 40px 20px;
            margin: 0;
        }

        .generator-card {
            background-color: var(--card-bg);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            width: 100%;
            max-width: 750px;
        }

        h2 {
            margin-top: 0;
            font-weight: 600;
            color: var(--text-main);
            margin-bottom: 8px;
        }

        p.subtitle {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-bottom: 24px;
            line-height: 1.5;
        }

        .form-row {
            display: flex;
            gap: 16px;
            margin-bottom: 16px;
        }

        .form-group {
            flex: 1;
            margin-bottom: 16px;
        }

        .form-row .form-group {
            margin-bottom: 0; 
        }

        label {
            display: block;
            font-size: 0.875rem;
            font-weight: 500;
            margin-bottom: 6px;
            color: var(--text-main);
        }

        select, input[type="text"] {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem;
            background-color: #fff;
            color: var(--text-main);
            outline: none;
            transition: border-color 0.2s;
            box-sizing: border-box;
        }

        select:focus, input[type="text"]:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        .custom-input {
            display: none;
            margin-top: 8px;
            border-color: var(--primary-color);
            background-color: #f0fdfa; 
        }

        .color-group {
            background-color: #f1f5f9;
            padding: 16px;
            border-radius: 8px;
            border: 1px solid #e2e8f0;
            margin-bottom: 16px;
            margin-top: 16px;
        }

        .three-colors-container {
            display: none; 
            gap: 16px;
            margin-top: 16px;
            background-color: #fff;
            padding: 16px;
            border-radius: 6px;
            border: 1px solid var(--border-color);
        }

        .color-picker-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            flex: 1;
            text-align: center;
        }

        .color-picker-item span {
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-main);
        }

        .color-picker-item small {
            font-size: 0.75rem;
            color: var(--text-muted);
            font-family: monospace;
        }

        input[type="color"] {
            appearance: none;
            -moz-appearance: none;
            -webkit-appearance: none;
            background: none;
            border: 0;
            cursor: pointer;
            height: 45px;
            width: 70px;
            padding: 0;
            border-radius: 4px;
        }

        input[type="color"]::-webkit-color-swatch-wrapper {
            padding: 0;
        }

        input[type="color"]::-webkit-color-swatch {
            border: 2px solid var(--border-color);
            border-radius: 4px;
        }

        .button-group {
            display: flex;
            gap: 12px;
            margin-top: 24px;
            margin-bottom: 20px;
        }

        button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 6px;
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .btn-primary {
            background-color: var(--primary-color);
            color: white;
            flex: 2;
        }

        .btn-primary:hover {
            background-color: var(--hover-color);
        }

        .btn-secondary {
            background-color: #f1f5f9;
            color: var(--text-main);
            border: 1px solid var(--border-color);
            flex: 1.5;
        }

        .btn-secondary:hover {
            background-color: #e2e8f0;
        }

        .btn-danger {
            background-color: #fff;
            color: var(--danger-color);
            border: 1px solid var(--danger-color);
            flex: 1;
        }

        .btn-danger:hover {
            background-color: #fef2f2;
        }

        textarea {
            width: 100%;
            height: 120px;
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem;
            resize: vertical;
            background-color: #f8fafc;
            line-height: 1.5;
            box-sizing: border-box;
        }
    </style>
</head>
<body>

    <div class="generator-card">
        <h2>LS Style AI Prompt Generator</h2>
        <p class="subtitle">Formula: Scene &rarr; Character &rarr; Action &rarr; Style &rarr; Mood &rarr; Lighting &rarr; Quality &rarr; BG Mode &rarr; Brand Color</p>

        <div class="form-row">
            <div class="form-group">
                <label for="scene">Scene</label>
                <select id="scene" onchange="toggleCustomInput('scene')">
                    <option value="">-- Select Scene --</option>
                    <option value="modern packaging manufacturing factory floor">Modern manufacturing factory floor</option>
                    <option value="bright corporate office and breakroom">Bright corporate office and breakroom</option>
                    <option value="collaborative HR meeting room">Collaborative HR meeting room</option>
                    <option value="safe and ergonomic industrial workspace">Safe industrial workspace</option>
                    <option value="custom" style="font-weight: bold;">-- Type Your Own --</option>
                </select>
                <input type="text" id="scene_custom" class="custom-input" placeholder="Type specific scene...">
            </div>
            
            <div class="form-group">
                <label for="character">Character</label>
                <select id="character" onchange="toggleCustomInput('character')">
                    <option value="">-- Select Character --</option>
                    <option value="diverse group of factory workers in safety uniforms">Factory Workers (Diverse Group)</option>
                    <option value="focused machine operator">Machine Operator (Individual)</option>
                    <option value="approachable line supervisor holding a tablet">Line Supervisor (With Tablet)</option>
                    <option value="professional corporate manager in business casual">Corporate Manager (Business Casual)</option>
                    <option value="manager and worker interacting positively">Manager & Worker (Interacting)</option>
                    <option value="IT or tech professional in a server room or modern tech desk">IT/Tech Professional (Server Room/Desk)</option>
                    <option value="customer service representative with headset, friendly expression">Customer Service Rep (With Headset)</option>
                    <option value="inclusive corporate environment featuring a professional using a wheelchair">Inclusive Professional (Using Wheelchair)</option>
                    <option value="custom" style="font-weight: bold;">-- Type Your Own --</option>
                </select>
                <input type="text" id="character_custom" class="custom-input" placeholder="Type specific character...">
            </div>
        </div>

        <div class="form-group">
            <label for="action">Action / Topic</label>
            <select id="action" onchange="toggleCustomInput('action')">
                <option value="">-- Select Action --</option>
                <optgroup label="Human Rights & Employment">
                    <option value="discussing fair compensation and decent work practices openly">Discussing fair compensation & decent work</option>
                    <option value="reviewing compliance and accessing a secure whistleblowing channel on a computer">Accessing a secure whistleblowing channel</option>
                </optgroup>
                <optgroup label="Effective Communication">
                    <option value="delivering an engaging presentation">Presentation</option>
                    <option value="practicing active listening during a one-on-one feedback session">Active listening & 1-on-1 feedback session</option>
                </optgroup>
                <optgroup label="Wellbeing">
                    <option value="taking a mindful mental health break in a comfortable lounge">Taking a mental health break in a lounge</option>
                    <option value="practicing workplace ergonomics and gentle stretching">Practicing workplace ergonomics & stretching</option>
                </optgroup>
                <optgroup label="Financial">
                    <option value="reviewing a transparent financial compensation and benefits dashboard">Reviewing financial compensation dashboard</option>
                    <option value="attending a financial literacy and retirement planning workshop">Attending a financial literacy workshop</option>
                </optgroup>
                <option value="custom" style="font-weight: bold;">-- Type Your Own --</option>
            </select>
            <input type="text" id="action_custom" class="custom-input" placeholder="Type specific action...">
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="style">Style</label>
                <select id="style" onchange="toggleCustomInput('style')">
                    <option value="">-- Select Style --</option>
                    <option value="clean flat corporate vector illustration, faceless characters, simplified geometric shapes, no strokes, no outlines">Clean Flat Corporate Vector (Faceless, No Stroke)</option>
                    <option value="clean corporate flat vector illustration with solid geometric shapes and clear lineart">Clean Corporate Flat Vector (With Lineart)</option>
                    <option value="modern 3D isometric render, smooth textures">Modern 3D isometric render</option>
                    <option value="realistic high-end corporate photography">Realistic high-end corporate photography</option>
                    <option value="2.5D modern tech illustration, semi-isometric, clean ui/ux aesthetic">2.5D Modern Tech / UI Illustration</option>
                    <option value="stylized corporate infographic aesthetic, data visualization style, minimal elements">Corporate Infographic / Data Viz Style</option>
                    <option value="custom" style="font-weight: bold;">-- Type Your Own --</option>
                </select>
                <input type="text" id="style_custom" class="custom-input" placeholder="Type specific visual style...">
            </div>
            <div class="form-group">
                <label for="mood">Mood</label>
                <select id="mood" onchange="toggleCustomInput('mood')">
                    <option value="">-- Select Mood --</option>
                    <option value="empathetic, supportive, and psychologically safe atmosphere">Emppathetic, supportive, psychologically safe</option>
                    <option value="energetic yet trustworthy training atmosphere">Energetic & trustworthy</option>
                    <option value="transparent, ethical, and professional">Transparent, ethical, professional</option>
                    <option value="serious, urgent, and cautionary atmosphere">Serious, urgent, and cautionary (Safety/Warning)</option>
                    <option value="focused, analytical, and data-driven environment">Focused, analytical, and data-driven</option>
                    <option value="custom" style="font-weight: bold;">-- Type Your Own --</option>
                </select>
                <input type="text" id="mood_custom" class="custom-input" placeholder="Type specific mood...">
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="lighting">Lighting & Composition</label>
                <select id="lighting" onchange="toggleCustomInput('lighting')">
                    <option value="">-- Select Lighting/Comp --</option>
                    <option value="soft directional lighting, wide angle group composition">Soft directional lighting, wide angle</option>
                    <option value="bright natural daylight, eye-level medium shot">Bright natural daylight, eye-level</option>
                    <option value="over-the-shoulder shot, looking at a digital screen or document, soft depth of field">POV / Over-the-shoulder shot (Looking at screen/document)</option>
                    <option value="extreme close-up macro shot on hands performing a specific task, dramatic focused lighting">Extreme close-up macro (Hands performing task)</option>
                    <option value="custom" style="font-weight: bold;">-- Type Your Own --</option>
                </select>
                <input type="text" id="lighting_custom" class="custom-input" placeholder="Type specific lighting or composition...">
            </div>
            <div class="form-group">
                <label for="quality">Quality</label>
                <select id="quality" onchange="toggleCustomInput('quality')">
                    <option value="">-- Select Quality --</option>
                    <option value="smooth premium high quality vector finish, masterpiece">Premium Vector Masterpiece</option>
                    <option value="8k resolution, photorealistic, highly detailed, ultra-sharp">8K Resolution, Ultra-sharp Photography</option>
                    <option value="custom" style="font-weight: bold;">-- Type Your Own --</option>
                </select>
                <input type="text" id="quality_custom" class="custom-input" placeholder="Type specific quality modifiers...">
            </div>
        </div>

        <div class="form-group">
            <label for="bgMode">Background Mode</label>
            <select id="bgMode">
                <option value="">-- Integrated with Scene (Default) --</option>
                <option value="integrated background scenery predominantly using light hex color #E0F0FE">Light Mode (Light Ambient Background #E0F0FE)</option>
                <option value="atmospheric background environment predominantly using dark hex color #004050">Dark Mode (Dark Ambient Background #004050)</option>
                <option value="isolated on a pure white background for easy transparent cutout">Transparent (Pure White Background for Cutout)</option>
            </select>
        </div>

        <div class="color-group">
            <label for="presetColor">Brand Color</label>
            <select id="presetColor" onchange="toggleColorPicker()">
                <option value="">-- No Color Preset --</option>
                <option value="incorporating a specific brand color palette utilizing hex codes #21BEE5 as primary, #2196F3 as secondary, and #FA005F as accent color">LS Brand Color (Cyan, Blue, Magenta)</option>
                <option value="custom_3" style="font-weight: bold; color: var(--primary-color);">+ Choose 3 Custom Brand Colors</option>
            </select>
            
            <div id="threeColorsWrapper" class="three-colors-container">
                <div class="color-picker-item">
                    <span>Primary Color</span>
                    <input type="color" id="colorPrimary" value="#21BEE5" oninput="updateHexLabels()">
                    <small id="hexPrimary">#21BEE5</small>
                </div>
                <div class="color-picker-item">
                    <span>Secondary Color</span>
                    <input type="color" id="colorSecondary" value="#2196F3" oninput="updateHexLabels()">
                    <small id="hexSecondary">#2196F3</small>
                </div>
                <div class="color-picker-item">
                    <span>Accent Color</span>
                    <input type="color" id="colorAccent" value="#FA005F" oninput="updateHexLabels()">
                    <small id="hexAccent">#FA005F</small>
                </div>
            </div>
        </div>

        <div class="button-group">
            <button class="btn-primary" onclick="generatePrompt()">Generate Prompt</button>
            <button class="btn-secondary" onclick="copyPrompt()">Copy Text</button>
            <button class="btn-danger" onclick="resetForm()">Reset</button>
        </div>

        <textarea id="outputResult" placeholder="Prompt result will appear here..."></textarea>
    </div>

    <script>
        function toggleCustomInput(id) {
            const selectElem = document.getElementById(id);
            const customInput = document.getElementById(id + '_custom');
            
            if (selectElem.value === 'custom') {
                customInput.style.display = 'block';
                customInput.focus();
            } else {
                customInput.style.display = 'none';
                customInput.value = ''; 
            }
        }

        function toggleColorPicker() {
            const colorSelect = document.getElementById('presetColor');
            const colorWrapper = document.getElementById('threeColorsWrapper');
            
            if (colorSelect.value === 'custom_3') {
                colorWrapper.style.display = 'flex';
            } else {
                colorWrapper.style.display = 'none';
            }
        }

        function updateHexLabels() {
            document.getElementById('hexPrimary').innerText = document.getElementById('colorPrimary').value.toUpperCase();
            document.getElementById('hexSecondary').innerText = document.getElementById('colorSecondary').value.toUpperCase();
            document.getElementById('hexAccent').innerText = document.getElementById('colorAccent').value.toUpperCase();
        }

        function getFinalValue(id) {
            const selectElem = document.getElementById(id);
            if (selectElem.value === 'custom') {
                return document.getElementById(id + '_custom').value.trim();
            }
            return selectElem.value;
        }

        function generatePrompt() {
            const ids = ['scene', 'character', 'action', 'style', 'mood', 'lighting', 'quality', 'bgMode'];
            let promptElements = [];

            ids.forEach(id => {
                const val = getFinalValue(id);
                if (val) {
                    promptElements.push(val);
                }
            });

            const colorMode = document.getElementById('presetColor').value;
            let finalColor = "";
            
            if (colorMode === 'custom_3') {
                const hex1 = document.getElementById('colorPrimary').value;
                const hex2 = document.getElementById('colorSecondary').value;
                const hex3 = document.getElementById('colorAccent').value;
                finalColor = `incorporating a specific brand color palette utilizing hex codes ${hex1} as primary, ${hex2} as secondary, and ${hex3} as accent color`;
            } else if (colorMode !== "") {
                finalColor = colorMode;
            }

            if (finalColor) {
                promptElements.push(finalColor);
            }

            const resultTextarea = document.getElementById('outputResult');
            
            if (promptElements.length === 0) {
                resultTextarea.value = "Please select or type at least one option to generate a prompt.";
                return;
            }

            resultTextarea.value = promptElements.join(', ');
        }

        function copyPrompt() {
            const copyText = document.getElementById("outputResult");
            
            if (!copyText.value || copyText.value.startsWith("Please select")) {
                alert("No prompt to copy!");
                return;
            }

            copyText.select();
            copyText.setSelectionRange(0, 99999); 
            
            navigator.clipboard.writeText(copyText.value).then(() => {
                alert("Prompt successfully copied to clipboard!");
            }).catch(err => {
                console.error('Failed to copy text: ', err);
            });
        }

        function resetForm() {
            const selects = document.querySelectorAll('select');
            selects.forEach(select => select.value = '');

            const customInputs = document.querySelectorAll('.custom-input');
            customInputs.forEach(input => {
                input.value = '';
                input.style.display = 'none';
            });

            document.getElementById('threeColorsWrapper').style.display = 'none';

            document.getElementById('colorPrimary').value = '#21BEE5';
            document.getElementById('colorSecondary').value = '#2196F3';
            document.getElementById('colorAccent').value = '#FA005F';
            updateHexLabels();

            document.getElementById('outputResult').value = '';
        }
    </script>
</body>
</html>
